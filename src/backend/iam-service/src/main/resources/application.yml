server:
  port: 8081

spring:
  application:
    name: iam-service
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:student_management_db}
    username: ${DB_USERNAME:app_user}
    password: ${DB_PASSWORD:app_password}
    driver-class-name: org.postgresql.Driver
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

# Logging Configuration
logging:
  level:
    root: INFO
    com.enterprise.studentmanagement.iam: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Springdoc OpenAPI configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    filter: true

iam:
  security:
    jwt:
      issuer: enterprise-iam
      access-token-ttl: ${JWT_EXPIRATION:3600s}
      refresh-token-ttl: ${REFRESH_TOKEN_EXPIRATION:604800s}
      public-key: ${JWT_PUBLIC_KEY:}
      private-key: ${JWT_PRIVATE_KEY:}
    password:
      min-length: ${PASSWORD_MIN_LENGTH:8}
      bcrypt-strength: ${BCRYPT_STRENGTH:12}
    login-protection:
      user-lock-threshold-1: ${LOCK_THRESHOLD_1:5}
      user-lock-duration-1: ${LOCK_DURATION_1:15m}
      user-lock-threshold-2: ${LOCK_THRESHOLD_2:10}
      user-lock-duration-2: ${LOCK_DURATION_2:30m}
      ip-block-threshold: ${IP_BLOCK_THRESHOLD:15}
